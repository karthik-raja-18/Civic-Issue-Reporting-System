<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- PWA Primary Meta -->
    <title>CivicPulse Coimbatore</title>
    <meta name="description" content="Report and track civic issues in Coimbatore District" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CivicPulse" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    
    <!-- Theme Selection -->
    <meta name="theme-color" content="#1B3A6B" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0D1117" media="(prefers-color-scheme: dark)" />
    
    <!-- Performance: Font Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      const theme = localStorage.getItem('civicpulse-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches 
          ? 'dark' : 'light');
      document.documentElement.classList.add(theme);
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
