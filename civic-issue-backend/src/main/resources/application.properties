# ============================================================
# Civic Issue Reporting System - Application Properties
# ============================================================

# Server
server.address=0.0.0.0
server.port=8080

# ─── MySQL Database ──────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── MySQL (Inactive) ────────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/civic_db
# spring.datasource.username=root
# spring.datasource.password=password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ─────────────────────────────────────────────────────
# Generate a strong 256-bit secret (change this in production!)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ??? ? NEW: Cloudinary ??????????????????????????????????????
# Get these from https://cloudinary.com ? Dashboard
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ??? ? NEW: Multipart file upload limits ????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ─── Logging ──────────────────────────────────────────────────
logging.level.com.civic=DEBUG
logging.level.com.cloudinary=DEBUG
logging.level.org.springframework.security=INFO

recaptcha.secret.key=${RECAPTCHA_SECRET_KEY}
gemini.api.key = ${GOOGLE_API_KEY}

# ─── OAuth 2.0 (Social Sign-In) ─────────────────────────────
# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

app.oauth2.authorized-redirect-uri=${APP_OAUTH2_AUTHORIZED_REDIRECT_URI}

# ─── Twilio (WhatsApp & SMS) ──────────────────────────────
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM}
twilio.sms.from=${TWILIO_SMS_FROM}



